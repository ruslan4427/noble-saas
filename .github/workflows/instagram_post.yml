name: Noble Instagram Auto-Post

on:
  schedule:
    # Check every hour Mon–Sat (Sun is manual only / story day)
    # UTC times — posts go out when schedule.json says so
    - cron: '0 10-22 * * 1-6'   # Mon–Sat 10:00–22:00 UTC (06:00–18:00 EDT)

  # Manual trigger — override schedule
  workflow_dispatch:
    inputs:
      day_number:
        description: 'Day number (1–7)'
        required: true
        type: number
      post_type:
        description: 'Post type'
        required: true
        type: choice
        options: [reel, feed]

concurrency:
  group: noble-git-push
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install instagrapi python-dotenv pillow

      - name: Determine what to post
        id: schedule
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          schedule_file = Path("marketing_system/week_content/schedule.json")
          event = os.environ.get("GITHUB_EVENT_NAME", "")

          # Manual dispatch — use inputs directly
          if event == "workflow_dispatch":
              day  = "${{ github.event.inputs.day_number }}"
              typ  = "${{ github.event.inputs.post_type }}"
              print(f"Manual trigger: day {day} {typ}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"day={day}\ntype={typ}\n")
              sys.exit(0)

          # Scheduled run — check schedule.json
          if not schedule_file.exists():
              print("No schedule.json found — skipping")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("day=0\ntype=none\n")
              sys.exit(0)

          schedule = json.loads(schedule_file.read_text())
          now_utc  = datetime.now(timezone.utc)
          window   = timedelta(minutes=35)  # ±35 min from scheduled time

          for post in schedule.get("posts", []):
              post_at = datetime.fromisoformat(post["post_at_utc"].replace("Z", "+00:00"))
              diff    = abs((now_utc - post_at).total_seconds())

              if diff <= window.total_seconds():
                  # Check not already published
                  pub_file = Path(f"marketing_system/week_content/{post['folder']}/published.json")
                  if pub_file.exists():
                      try:
                          pub = json.loads(pub_file.read_text())
                          if pub:
                              print(f"Day {post['day']} already published — skipping")
                              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                                  f.write("day=0\ntype=none\n")
                              sys.exit(0)
                      except Exception:
                          pass

                  print(f"Posting: day={post['day']} type={post['type']} scheduled={post['post_at_edt']}")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"day={post['day']}\ntype={post['type']}\n")
                  sys.exit(0)

          print(f"Nothing scheduled at {now_utc.strftime('%H:%M UTC')} — skipping")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("day=0\ntype=none\n")
          PYEOF

      - name: Post to Instagram
        if: steps.schedule.outputs.type != 'none' && steps.schedule.outputs.day != '0'
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_SESSION_JSON: ${{ secrets.IG_SESSION_JSON }}
        run: |
          cd marketing_system

          # Restore session from secret
          mkdir -p mcp_instagram
          echo "$IG_SESSION_JSON" > mcp_instagram/session.json

          python3 poster.py \
            --day ${{ steps.schedule.outputs.day }} \
            --type ${{ steps.schedule.outputs.type }}

      - name: Commit published.json + post_stats after posting
        if: steps.schedule.outputs.type != 'none' && steps.schedule.outputs.day != '0'
        run: |
          git config user.name  "noble-bot"
          git config user.email "bot@noblelink.app"
          git add marketing_system/week_content/
          git add marketing_system/output/engagement/post_stats.json
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "auto(post): day ${{ steps.schedule.outputs.day }} ${{ steps.schedule.outputs.type }} published"
          git push

      - name: Skip
        if: steps.schedule.outputs.type == 'none' || steps.schedule.outputs.day == '0'
        run: echo "Nothing to post at this time — skipping."
