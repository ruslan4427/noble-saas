name: Noble Instagram Auto-Post

on:
  schedule:
    # All times in UTC (EDT = UTC-4)
    # ── Current week (Jun 7–10 2026) ──
    - cron: '0 15 7 6 *'    # Sun Jun 7  11:00 EDT → post_reel day 1
    - cron: '30 15 8 6 *'   # Mon Jun 8  11:30 EDT → post_feed day 2
    - cron: '0 0 10 6 *'    # Tue Jun 9  20:00 EDT → post_reel day 7
    - cron: '0 13 10 6 *'   # Wed Jun 10 09:00 EDT → post_reel day 3

    # ── Weekly recurring (every Monday 11:30 EDT = 15:30 UTC) ──
    # Uncomment when you want a weekly auto-post cadence
    # - cron: '30 15 * * 1'

  # Manual trigger (run anytime from GitHub UI)
  workflow_dispatch:
    inputs:
      day_number:
        description: 'Day number (1–7)'
        required: true
        type: number
      post_type:
        description: 'Post type'
        required: true
        type: choice
        options: [reel, feed]

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install instagrapi python-dotenv pillow

      - name: Determine what to post
        id: schedule
        run: |
          # For scheduled runs, map UTC time → day + type
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DAY=$(date -u +%d)
          MONTH=$(date -u +%m)
          WEEKDAY=$(date -u +%u)  # 1=Mon ... 7=Sun

          echo "UTC: $MONTH-$DAY $HOUR:$MIN (weekday $WEEKDAY)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "day=${{ github.event.inputs.day_number }}" >> $GITHUB_OUTPUT
            echo "type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
            echo "Manual trigger: day ${{ github.event.inputs.day_number }} ${{ github.event.inputs.post_type }}"
          elif [ "$MONTH" = "06" ] && [ "$DAY" = "07" ]; then
            echo "day=1" >> $GITHUB_OUTPUT
            echo "type=reel" >> $GITHUB_OUTPUT
            echo "Jun 7 → reel day 1"
          elif [ "$MONTH" = "06" ] && [ "$DAY" = "08" ]; then
            echo "day=2" >> $GITHUB_OUTPUT
            echo "type=feed" >> $GITHUB_OUTPUT
            echo "Jun 8 → feed day 2"
          elif [ "$MONTH" = "06" ] && [ "$DAY" = "10" ] && [ "$HOUR" = "00" ]; then
            echo "day=7" >> $GITHUB_OUTPUT
            echo "type=reel" >> $GITHUB_OUTPUT
            echo "Jun 9 20:00 EDT → reel day 7"
          elif [ "$MONTH" = "06" ] && [ "$DAY" = "10" ] && [ "$HOUR" = "13" ]; then
            echo "day=3" >> $GITHUB_OUTPUT
            echo "type=reel" >> $GITHUB_OUTPUT
            echo "Jun 10 → reel day 3"
          else
            echo "day=0" >> $GITHUB_OUTPUT
            echo "type=none" >> $GITHUB_OUTPUT
            echo "No post scheduled for this time"
          fi

      - name: Post to Instagram
        if: steps.schedule.outputs.type != 'none' && steps.schedule.outputs.day != '0'
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_SESSION_JSON: ${{ secrets.IG_SESSION_JSON }}
        run: |
          cd marketing_system
          python poster.py \
            --day ${{ steps.schedule.outputs.day }} \
            --type ${{ steps.schedule.outputs.type }}

      - name: Skip (no post scheduled)
        if: steps.schedule.outputs.type == 'none' || steps.schedule.outputs.day == '0'
        run: echo "Nothing to post at this time — skipping."
